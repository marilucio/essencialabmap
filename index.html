<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-ico32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="60x60"
      href="/favicon-ico60x60.png"
    />
    <link rel="shortcut icon" href="/favicon-ico32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Básico -->
    <title>EssenciaLab Aplicativo de Saúde e Desenvolvimento Pessoal</title>
    <meta
      name="description"
      content="Transforme sua vida através da integração entre ciência, tecnologia e bem-estar humano. Aromaterapia, cursos e ferramentas de autoconhecimento."
    />
    <meta
      name="keywords"
      content="aromaterapia, naturopatia, desenvolvimento pessoal, saúde preventiva, autoconhecimento, bem-estar, EssenciaLab, método CALMA"
    />
    <meta name="author" content="Marilúcio Rocha" />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:title"
      content="EssenciaLab - Aplicativo de Saúde e Desenvolvimento Pessoal"
    />
    <meta
      property="og:description"
      content="Transforme sua vida através da sabedoria da natureza e tecnologia. Acesso gratuito + Método CALMA de presente."
    />
    <meta property="og:image" content="/capa-meta.jpg" />
    <meta property="og:type" content="website" />

    <!-- AOS - Animate On Scroll -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Meta Pixel (somente /renal, no head) -->
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, "") || "/";
        if (path !== "/renal") return;

        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = true;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = true;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(
          window,
          document,
          "script",
          "https://connect.facebook.net/en_US/fbevents.js",
        );

        fbq("init", "1176389559234307");
        fbq("track", "PageView");
        window.__renalCompleteRegistration = function () {
          fbq("track", "CompleteRegistration");
        };
      })();
    </script>
  </head>
  <body>
    <!-- Noscript do Meta Pixel removido para evitar carregamento de ID incorreto
         e duplicidade de pixels. -->

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Hidden form for Netlify crawler – não remover -->
    <form name="guia-essencialab" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="especialidade" />
    </form>
  </body>
</html>
