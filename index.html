<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-ico32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="60x60"
      href="/favicon-ico60x60.png"
    />
    <link rel="shortcut icon" href="/favicon-ico32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Básico -->
    <title>EssenciaLab — Atraia e Fidelize Clientes com Análise Facial | Para Consultores de Bem-Estar</title>
    <meta
      name="description"
      content="A ferramenta que transforma a câmera do celular em porta de entrada para novos clientes. Análise facial gera mapas de bem-estar personalizados e abre conversas naturais. Teste grátis 7 dias."
    />
    <meta
      name="keywords"
      content="análise facial, prospecção de clientes, consultores de bem-estar, aromaterapia, fidelização de clientes, óleos essenciais, ferramenta para consultores"
    />
    <meta name="author" content="Marilúcio Rocha" />

    <!-- Open Graph / Facebook -->
    <!--
      NOTA: as tags OG permanecem em pt-BR (idioma padrão). Crawlers de preview
      de link (WhatsApp, Facebook) não executam JS, então esta é uma limitação
      estrutural de SPA — não há como variar og:title/description/image por
      idioma sem SSR/prerender ou rotas dedicadas (/en, /es). Decisão registrada.
    -->
    <meta
      property="og:title"
      content="EssenciaLab — A ferramenta que atrai clientes novos e fideliza os antigos"
    />
    <meta
      property="og:description"
      content="Análise facial que gera mapas de bem-estar e abre conversas naturais com clientes. Usada por centenas de consultores. Teste grátis por 7 dias, sem cartão."
    />
    <meta property="og:image" content="/capa-meta.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://essencialab.site/" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="EssenciaLab" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="EssenciaLab — A ferramenta que atrai clientes novos e fideliza os antigos"
    />
    <meta
      name="twitter:description"
      content="Análise facial que gera mapas de bem-estar e abre conversas naturais com clientes. Usada por centenas de consultores. Teste grátis por 7 dias, sem cartão."
    />
    <meta name="twitter:image" content="/capa-meta.jpg" />

    <!-- AOS - Animate On Scroll -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Meta Pixel (landing "/" + /essencialab + /renal) -->
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, "") || "/";
        var pixelPaths = ["/", "/essencialab", "/renal"];
        if (pixelPaths.indexOf(path) === -1) return;

        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = true;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = true;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(
          window,
          document,
          "script",
          "https://connect.facebook.net/en_US/fbevents.js",
        );

        fbq("init", "1147561227476007");
        fbq("track", "PageView");
        window.__renalCompleteRegistration = function () {
          fbq("track", "CompleteRegistration");
        };
      })();
    </script>
  </head>
  <body>
    <!-- Noscript do Meta Pixel removido para evitar carregamento de ID incorreto
         e duplicidade de pixels. -->

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Hidden form for Netlify crawler – não remover -->
    <form name="guia-essencialab" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="especialidade" />
    </form>
  </body>
</html>
